version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: weiyang-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - PADDLEOCR_ACCESS_TOKEN=${PADDLEOCR_ACCESS_TOKEN}
      - PADDLEOCR_DOC_PARSING_API_URL=${PADDLEOCR_DOC_PARSING_API_URL:-https://paddleocr.com/layout-parsing}
      - PADDLEOCR_DOC_PARSING_TIMEOUT=${PADDLEOCR_DOC_PARSING_TIMEOUT:-600}
    volumes:
      - ./backend/DegreeRequirements:/app/backend/DegreeRequirements:ro
    networks:
      - weiyang-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: weiyang-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - weiyang-network

networks:
  weiyang-network:
    driver: bridge
